<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault — Private Savings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #07080f;
      --surface:     #0e1118;
      --card:        #131720;
      --border:      rgba(255,255,255,0.07);
      --gold:        #c9a96e;
      --gold-light:  #e8c88e;
      --gold-dim:    rgba(201,169,110,0.12);
      --text:        #f0e9df;
      --text-muted:  rgba(240,233,223,0.45);
      --emerald:     #10b981;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Background mesh ── */
    .bg-mesh {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,169,110,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(16,185,129,0.05) 0%, transparent 55%),
        radial-gradient(ellipse 50% 80% at 60% 50%, rgba(201,169,110,0.04) 0%, transparent 70%);
    }

    /* ── Grain overlay ── */
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px;
    }
    /* ── Layout ── */
    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* ── Logo mark ── */
    .logo-mark {
      width: 72px; height: 72px;
      border: 1px solid var(--border-gold, rgba(201,169,110,0.3));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(201,169,110,0.1), rgba(201,169,110,0.04));
      margin-bottom: 2rem;
      animation: floatMark 4s ease-in-out infinite;
    }
    .logo-mark i { color: var(--gold); font-size: 1.75rem; }

    @keyframes floatMark {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="grain"></div>

  <div class="page">
    <div class="appear d1" style="text-align:center;">
      <div class="logo-mark" style="margin:0 auto 2rem;">
        <i class="fas fa-piggy-bank"></i>
      </div>
    </div>

    <div class="appear d2" style="text-align:center; margin-bottom:2.5rem;">
      <h1 class="wordmark">Vault<span>.</span></h1>
      <p class="tagline">Private Savings, Elevated</p>
    </div>

    <div class="divider appear d2"></div>

    <p class="body-copy appear d3">
      A personal savings vault designed for those who take their financial future seriously.
      Set goals, track progress, build habits — with the discipline of a private account.
    </p>

    <div class="appear d4" style="width:100%; display:flex; flex-direction:column; align-items:center;">
      <button class="btn-primary" id="getStartedBtn">
        Open Your Vault
        <i class="fas fa-arrow-right" style="font-size:.75rem;"></i>
      </button>
      <p class="sub-note">Secure · Private · Free</p>
    </div>
  </div>
</body>
</html>
