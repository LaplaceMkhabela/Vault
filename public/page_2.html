<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault — How It Works</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07080f; --surface: #0e1118; --card: #131720;
      --border: rgba(255,255,255,0.07); --border-gold: rgba(201,169,110,0.2);
      --gold: #c9a96e; --gold-light: #e8c88e; --gold-dim: rgba(201,169,110,0.1);
      --text: #f0e9df; --text-muted: rgba(240,233,223,0.45); --emerald: #10b981;
    }
    html,body { min-height:100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }
    .bg-mesh {
      position: fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 20%, rgba(201,169,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 85% 80%, rgba(16,185,129,0.04) 0%, transparent 55%);
    }
    .grain {
      position: fixed; inset:0; pointer-events:none; z-index:1; opacity:.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }
    .page {
      position: relative; z-index: 2;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
    }
     /* Step number */
    .step-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem; font-weight: 300;
      color: var(--gold); opacity: .35; line-height:1;
      margin-bottom: .5rem;
    }
    /* Section heading */
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 400; letter-spacing: .02em; margin-bottom: .5rem;
    }
    .section-sub {
      font-size: .8rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 2.5rem;
    }
    /* Goal preview cards */
    .goal-cards {
      display: flex; gap: 1rem; justify-content: center;
      align-items: flex-end; margin-bottom: 2rem;
    }
    .goal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem 1rem;
      display: flex; flex-direction: column; align-items: center; gap: .5rem;
      min-width: 80px; transition: transform .2s, border-color .2s;
    }
    .goal-card.featured {
      border-color: var(--border-gold);
      background: linear-gradient(160deg, rgba(201,169,110,0.1), rgba(201,169,110,0.04));
      transform: translateY(-8px);
      box-shadow: 0 16px 40px rgba(0,0,0,.4);
    }
    .goal-card i { font-size: 1.5rem; }
    .goal-card span { font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--text-muted); }
    /* Step cards */
    .steps { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; width:100%; max-width:700px; margin-bottom:2.5rem; }
    @media(max-width:600px){ .steps { grid-template-columns:1fr; max-width:340px; } }
    .step-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem 1.25rem;
      display: flex; flex-direction: column; align-items: flex-start; gap: .75rem;
      transition: border-color .2s, transform .2s;
    }
    .step-card:hover { border-color: var(--border-gold); transform: translateY(-2px); }
    .step-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--gold-dim);
      border: 1px solid rgba(201,169,110,.2);
      display: flex; align-items: center; justify-content: center;
    }
    .step-icon i { color: var(--gold); font-size: .9rem; }
    .step-card h3 { font-size: .85rem; font-weight: 600; letter-spacing: .05em; }
    .step-card p { font-size: .8rem; color: var(--text-muted); line-height: 1.6; }
    /* Buttons */
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: .75rem;
      width:100%; max-width:280px;
      background: linear-gradient(135deg, #c9a96e 0%, #a8844a 100%);
      color: #07080f; font-family:'DM Sans',sans-serif; font-size:.82rem;
      font-weight:600; letter-spacing:.1em; text-transform:uppercase;
      padding:.9rem 2rem; border:none; border-radius:4px; cursor:pointer;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 6px 24px rgba(201,169,110,.2);
    }
    .btn-primary:hover { opacity:.9; transform:translateY(-1px); }
    .btn-ghost {
      background:none; border:none; cursor:pointer;
      color: var(--text-muted); font-family:'DM Sans',sans-serif;
      font-size:.78rem; letter-spacing:.1em; text-transform:uppercase;
      padding:.6rem; margin-top:.75rem;
      transition: color .2s;
    }
    .btn-ghost:hover { color: var(--text); }
    /* Appear */
    .appear { opacity:0; transform:translateY(14px); animation: appear .7s ease-out forwards; }
    @keyframes appear { to { opacity:1; transform:translateY(0); } }
    .d1{animation-delay:.05s} .d2{animation-delay:.2s} .d3{animation-delay:.35s} .d4{animation-delay:.5s}
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="grain"></div>
  <div class="page">

    <div class="appear d1" style="text-align:center; margin-bottom:2rem;">
      <p class="section-sub">How It Works</p>
      <h2 class="section-title">Your goals, organised</h2>
    </div>

    <div class="goal-cards appear d2">
      <div class="goal-card">
        <i class="fas fa-plane" style="color:#60a5fa;"></i>
        <span>Travel</span>
      </div>
      <div class="goal-card featured">
        <i class="fas fa-piggy-bank" style="color:var(--gold);"></i>
        <span style="color:var(--gold);">Car Fund</span>
      </div>
      <div class="goal-card">
        <i class="fas fa-laptop" style="color:#34d399;"></i>
        <span>Tech</span>
      </div>
    </div>

    <div class="steps appear d3">
      <div class="step-card">
        <div class="step-icon"><i class="fas fa-plus"></i></div>
        <div>
          <h3>Create</h3>
          <p>Open a vault for any goal with a name, target, and withdrawal rules.</p>
        </div>
      </div>
      <div class="step-card">
        <div class="step-icon"><i class="fas fa-coins"></i></div>
        <div>
          <h3>Deposit</h3>
          <p>Add funds whenever you're ready — no minimums, no friction.</p>
        </div>
      </div>
      <div class="step-card">
        <div class="step-icon"><i class="fas fa-chart-line"></i></div>
        <div>
          <h3>Track</h3>
          <p>Watch your balance grow, your streak build, and your goals get closer.</p>
        </div>
      </div>
    </div>

    <div class="appear d4" style="display:flex; flex-direction:column; align-items:center;">
      <button class="btn-primary" onclick="handleNext()">Continue <i class="fas fa-arrow-right" style="font-size:.7rem;"></i></button>
      <button class="btn-ghost" onclick="window.location.href='/'">← Back</button>
    </div>

  </div>
  <script>
    function handleNext() {
      document.body.style.transition = 'opacity .4s';
      document.body.style.opacity = '0';
      setTimeout(() => { window.location.href = '/security'; }, 400);
    }
  </script>
</body>
</html>
