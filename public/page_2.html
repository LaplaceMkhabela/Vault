<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault — How It Works</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07080f; --surface: #0e1118; --card: #131720;
      --border: rgba(255,255,255,0.07); --border-gold: rgba(201,169,110,0.2);
      --gold: #c9a96e; --gold-light: #e8c88e; --gold-dim: rgba(201,169,110,0.1);
      --text: #f0e9df; --text-muted: rgba(240,233,223,0.45); --emerald: #10b981;
    }
    html,body { min-height:100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="grain"></div>
  <div class="page">

    <div class="appear d1" style="text-align:center; margin-bottom:2rem;">
      <p class="section-sub">How It Works</p>
      <h2 class="section-title">Your goals, organised</h2>
    </div>

    <div class="goal-cards appear d2">
      <div class="goal-card">
        <i class="fas fa-plane" style="color:#60a5fa;"></i>
        <span>Travel</span>
      </div>
      <div class="goal-card featured">
        <i class="fas fa-piggy-bank" style="color:var(--gold);"></i>
        <span style="color:var(--gold);">Car Fund</span>
      </div>
      <div class="goal-card">
        <i class="fas fa-laptop" style="color:#34d399;"></i>
        <span>Tech</span>
      </div>
    </div>

    <div class="steps appear d3">
      <div class="step-card">
        <div class="step-icon"><i class="fas fa-plus"></i></div>
        <div>
          <h3>Create</h3>
          <p>Open a vault for any goal with a name, target, and withdrawal rules.</p>
        </div>
      </div>
      <div class="step-card">
        <div class="step-icon"><i class="fas fa-coins"></i></div>
        <div>
          <h3>Deposit</h3>
          <p>Add funds whenever you're ready — no minimums, no friction.</p>
        </div>
      </div>
      <div class="step-card">
        <div class="step-icon"><i class="fas fa-chart-line"></i></div>
        <div>
          <h3>Track</h3>
          <p>Watch your balance grow, your streak build, and your goals get closer.</p>
        </div>
      </div>
    </div>

    <div class="appear d4" style="display:flex; flex-direction:column; align-items:center;">
      <button class="btn-primary" onclick="handleNext()">Continue <i class="fas fa-arrow-right" style="font-size:.7rem;"></i></button>
      <button class="btn-ghost" onclick="window.location.href='/'">← Back</button>
    </div>

  </div>

</body>
</html>
